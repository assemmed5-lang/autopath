name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin' }
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > quizvocal.jks
      - name: Sanity check decoded keystore file
        run: |
          SIZE=$(stat -c%s quizvocal.jks)
          echo "Decoded keystore size: $SIZE bytes"
          if [ "$SIZE" -lt 500 ]; then
            echo "ERROR: decoded file is suspiciously small — KEYSTORE_BASE64 secret is likely truncated or wrong."
            exit 1
          fi
          MAGIC=$(xxd -p -l4 quizvocal.jks)
          echo "First 4 bytes (hex): $MAGIC"
          if [ "$MAGIC" != "feedfeed" ]; then
            echo "ERROR: file does not start with JKS magic bytes (feedfeed)."
            echo "This means KEYSTORE_BASE64 was corrupted when decoded (extra newline, CRLF, or bad copy/paste)."
            exit 1
          fi
      - name: Verify keystore and key password (real decrypt test)
        run: |
          keytool -importkeystore \
            -srckeystore quizvocal.jks -srcstoretype JKS \
            -srcalias "${{ secrets.KEY_ALIAS }}" \
            -srcstorepass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -srckeypass "${{ secrets.KEY_PASSWORD }}" \
            -destkeystore /tmp/verify.p12 -deststoretype PKCS12 \
            -deststorepass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -destkeypass "${{ secrets.KEYSTORE_PASSWORD }}"
          echo "Keystore, alias and passwords are all valid."
      - name: Build and Patch
        run: |
          mkdir -p www/MP3
          cp index.html www/
          cp MP3/*.mp3 www/MP3/ 2>/dev/null || true
          echo '{"name":"quizvocal","version":"1.0.0","private":true}' > package.json
          npm install @capacitor/core@5 @capacitor/cli@5 @capacitor/android@5 @capacitor-community/speech-recognition@5
          python3 -c "import json; open('capacitor.config.json','w').write(json.dumps({'appId':'com.quizvocal.patho','appName':'QuizVocal','webDir':'www','androidScheme':'https','android':{'allowMixedContent':True}}, indent=2))"
          npx cap add android
          npx cap sync android
          GRADLE_FILE="android/app/build.gradle"
          sed -i "s/versionCode [0-9]*/versionCode ${{ github.run_number }}/" "$GRADLE_FILE"
          sed -i "s/versionName \"[^\"]*\"/versionName \"1.0.${{ github.run_number }}\"/" "$GRADLE_FILE"
          MANIFEST=$(find android/app -name "AndroidManifest.xml" | head -1)
          sed -i 's|<application|<uses-permission android:name="android.permission.RECORD_AUDIO"/>\n    <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS"/>\n    <application|' "$MANIFEST"
          mkdir -p android/app/src/main/java/com/quizvocal/patho
          cat > MainActivity.java << 'JAVAEOF'
          package com.quizvocal.patho;
          import com.getcapacitor.BridgeActivity;
          import android.os.Bundle;
          import android.webkit.PermissionRequest;
          import android.webkit.WebChromeClient;
          import android.webkit.WebView;
          import com.getcapacitor.community.speechrecognition.SpeechRecognition;
          public class MainActivity extends BridgeActivity {
              @Override
              public void onCreate(Bundle savedInstanceState) {
                  registerPlugin(SpeechRecognition.class);
                  super.onCreate(savedInstanceState);
                  WebView webView = getBridge().getWebView();
                  webView.setWebChromeClient(new WebChromeClient() {
                      @Override
                      public void onPermissionRequest(PermissionRequest request) {
                          request.grant(request.getResources());
                      }
                  });
              }
          }
          JAVAEOF
          cp MainActivity.java android/app/src/main/java/com/quizvocal/patho/MainActivity.java
          cp quizvocal.jks android/app/quizvocal.jks
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file="$(pwd)/app/quizvocal.jks" \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}
      - uses: actions/upload-artifact@v4
        with:
          name: quizvocal-apk
          path: android/app/build/outputs/apk/release/app-release.apk
